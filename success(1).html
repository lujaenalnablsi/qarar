<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>QARAR | تسجيل التصويت</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
          href="css/success.css">

</head>

<body>

<!-- ========================= -->

<section id="loadingScreen"

class="screen active">

<div class="loader"></div>

<h1>

جاري تسجيل صوتك...

</h1>

</section>

<!-- ========================= -->

<section id="successScreen"

class="screen">

<div class="success-circle">

<i class="fa-solid fa-check"></i>

</div>

<h1
id="successTitle"

data-voice="تم تسجيل صوتك بنجاح">

تم بنجاح!

</h1>

<p
id="successMessage"

data-voice="تم تسجيل صوتك بنجاح. نشكر مشاركتك في صنع القرار.">

تم تسجيل صوتك بنجاح.

<br>

نشكر مشاركتك في صنع القرار.

</p>
<!-- ========================= -->

<div class="security-card">

    <div class="security-icon">

        <i class="fa-solid fa-lock"></i>

    </div>

    <div class="security-text">

        <h3>

            تم تشفير صوتك بالكامل

        </h3>

        <p>

            ولا يمكن لأي جهة معرفة اختيارك.

        </p>

    </div>

</div>

<div class="countdown-box">

    <i class="fa-regular fa-clock"></i>

    <span>

        سيتم إنهاء الجلسة خلال

    </span>

</div>

<div class="countdown-circle">

    <span id="counter">

        5

    </span>

</div>

<p class="counter-label">

ثوانٍ متبقية

</p>

<button

id="finishBtn"

class="finish-btn">

<i class="fa-solid fa-right-from-bracket"></i>

إنهاء الجلسة

</button>

</section>

<!-- ========================= -->

<section

id="waitScreen"

class="screen">

<div class="wait-icon">

<i class="fa-solid fa-lock"></i>

</div>

<h1>

يرجى الانتظار

</h1>

<p>

سيقوم الموظف بتفعيل شاشة التصويت بعد التحقق من الهوية

</p>

</section>

<script src="js/success.js"></script>

</body>

</html>
